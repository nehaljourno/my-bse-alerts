name: BSE-Alert-Bot

on:
  schedule:
    # This runs every 10 minutes
    - cron: '*/10 * * * *'
  # This adds a "Run Workflow" button in GitHub so you can test it manually
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your code from GitHub into the virtual machine
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Install Python on the virtual machine
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install the required libraries (CRUCIAL STEP)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser google-generativeai

      # 4. Run your scraper and pass the Secrets securely
      - name: Run Scraper
        run: python scraper.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
