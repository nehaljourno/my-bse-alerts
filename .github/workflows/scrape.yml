name: BSE Deep Scraper

on:
  schedule:
    - cron: '*/10 * * * *' 
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to save the sent_alerts.txt state
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit State
        run: |
          git config --global user.name 'BSE-Bot'
          git config --global user.email 'bot@bse.com'
          git add sent_alerts.txt || true
          git commit -m "Update sent alerts history [skip ci]" || true
          git push || true
