name: BSE Deep Scraper

on:
  schedule:
    - cron: '*/10 * * * *' 
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Selenium and Dependencies
        run: |
          pip install seleniumbase google-genai pypdf requests
          sbase install chromedriver

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit State
        run: |
          git config --global user.name 'BSE-Bot'
          git config --global user.email 'bot@bse.com'
          touch sent_alerts.txt
          git add sent_alerts.txt
          git commit -m "Update history [skip ci]" || echo "No changes"
          git push || echo "No changes"
